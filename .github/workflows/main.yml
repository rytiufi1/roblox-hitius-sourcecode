name: Zero-Work Full Builder
on: [push]

jobs:
  build:
    runs-on: windows-latest
    env:
      MEGA_LINK: "https://mega.nz/file/eyQyWaiL"
      ENCRYPTION_KEY: "JyaWhnQ6MrvdF5h03ts_4ingrVQzBIcEV4NpU1tcUTY"
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Build Tools & Dependencies
        run: |
          # Only install what's missing. VS2015 tools are usually part of the VS2019/2022 workload.
          choco install megatools 7zip -y
          
          # This is the "official" way to add the VS2017/2015 toolsets to the GitHub Runner
          dotnet build-server shutdown
          & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vs_installer.exe" modify --installPath "C:\Program Files\Microsoft Visual Studio\2022\Enterprise" --add Microsoft.VisualStudio.Component.VC.v141 --add Microsoft.VisualStudio.Component.VC.140 --quiet --norestart
        shell: pwsh

      - name: Download & Extract Libraries
        run: |
          megadl "${{ env.MEGA_LINK }}" --path .
          mkdir Library
          7z x *.7z -p${{ env.ENCRYPTION_KEY }} -oLibrary/ -y

      - name: Fix Script Paths Automatically
        shell: pwsh
        run: |
          # Automatically finds D:\ or C:\ style paths in bat files and replaces them with the current directory
          $files = Get-ChildItem -Path "Library\boost\*.bat" -Recurse
          foreach ($file in $files) {
            (Get-Content $file.PSPath) -replace '[A-Z]:\\[^; "]+', $pwd.Path | Set-Content $file.PSPath
            Write-Host "Auto-fixed paths in: $($file.Name)"
          }

      - name: Build Boost
        shell: cmd
        run: |
          cd Library\boost
          call bootstrap.bat
          call build_boost.bat

      - name: Configure & Build Qt (VS2015)
        shell: cmd
        run: |
          # Sets environment to VS2015 for the Qt build requirement
          call "C:\Program Files (x86)\Microsoft Visual Studio 14.0\VC\vcvarsall.bat" x86
          cd Library\Qt
          # Using relative path for -prefix to avoid hardcoded errors
          configure -make nmake -platform win32-msvc2015 -prefix %CD% -opensource -confirm-license -opengl desktop -nomake examples -nomake tests -webkit -xmlpatterns
          nmake

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build Roblox Solution
        run: |
          # Targets the v141 toolset within the modern runner
          msbuild Roblox.sln /p:Configuration=Release /p:Platform=x86 /p:PlatformToolset=v141 /p:TreatWarningsAsError=false /t:WindowsClient
          msbuild Roblox.sln /p:Configuration=Release /p:Platform=x86 /p:PlatformToolset=v141 /p:TreatWarningsAsError=false /t:XboxClient
          msbuild Roblox.sln /p:Configuration=ReleaseRCC /p:Platform=x86 /p:PlatformToolset=v141 /p:TreatWarningsAsError=false /t:RCCService

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Roblox-2016-Full-Suite
          path: bin/

